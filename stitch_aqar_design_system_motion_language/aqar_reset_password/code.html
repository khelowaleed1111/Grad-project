<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password - Aqar Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "tertiary": "#00450d",
                        "outline": "#717a6d",

                        "primary-container": "#1b5e20",

                        "inverse-primary": "#91d78a",
                        "surface-container-highest": "#e4e2e1",
                        "surface-container": "#f0eded",
                        "surface": "#fbf9f8",
                        "surface-variant": "#e4e2e1",
                        "tertiary-container": "#055f18",
                        "secondary-container": "#fcab28",
                        "on-tertiary-fixed-variant": "#005312",
                        "surface-bright": "#fbf9f8",
                        "inverse-surface": "#303030",
                        "surface-tint": "#2a6b2c",
                        "on-primary-container": "#90d689",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",

                        "on-error-container": "#93000a",

                        "error-container": "#ffdad6",

                        "outline-variant": "#c0c9bb",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    "spacing": {

                    },
                    "fontFamily": {
                        "display-h1": ["Playfair Display"],
                        "ui-h4": ["DM Sans"],
                        "body-sm": ["DM Sans"],
                        "ui-h3": ["DM Sans"],

                        "arabic-body": ["16px", { "lineHeight": "1.8", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Floating Label Styles */
        .floating-input {
            transition: border-color 0.2s, background-color 0.2s;
        }
        .floating-input:focus {
            outline: none;
            border-color: #2E7D32; /* Primary Mid */
        }
        .floating-label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            transition: all 0.2s ease-out;
            pointer-events: none;
            color: #717a6d; /* outline */
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
        }
        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: 0;
            background-color: #ffffff;
            padding: 0 4px;
            font-size: 12px;
            color: #2E7D32;
            transform: translateY(-50%);
        }
    </style>
</head>
<body class="bg-[#E8F5E9] min-h-screen flex items-center justify-center p-margin font-body-main text-on-surface">
<!-- Main Container -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-[24px] shadow-[0px_12px_40px_rgba(0,0,0,0.12)] p-xl relative overflow-hidden">
<!-- Background Banner Image -->
<div class="absolute top-0 left-0 w-full h-32 bg-cover bg-center opacity-20" data-alt="A subtle, elegant architectural abstract pattern featuring gentle green tones and smooth, flowing lines. The imagery evokes a sense of heritage and premium real estate, with soft lighting and a modern, grounded aesthetic suitable for a high-end property brand's background texture." style="background-image: url('https://lh3.googleusercontent.com/aida/ADBb0ugrOCNUmxzshyDUDu57y6Np6IW6-1SqVLavnKSPCkkVGJpAX0VeCJCW7FBtCfuvMu6jVaG6PCN-C-wW3uXOFHR0tre3i6QbQrsb8O8mWD0_N_ZqBmE-R2fulfaRYKYphsFenIhiwcNTgQjLgVnlxKQegpYSiQzfZbDm_PEdQy-oxAA1Z77BJqqnvZ1eJC-oURcS8ohD6l0mjbXknEXjNxwEgwIMkO7-_sGGZIFzMbJUTZd_iSxEc8tc5agP');"></div>
<!-- Form State -->
<div class="relative z-10 flex flex-col items-center" id="reset-form-state">
<!-- Logo & Icon -->
<div class="mb-lg flex flex-col items-center">
<span class="font-display-h2 text-display-h2 text-primary font-bold mb-md">Aqar Home</span>
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center shadow-[0px_4px_20px_rgba(27,94,32,0.08)]">
<span class="material-symbols-outlined filled text-on-primary text-3xl" data-icon="lock_reset">lock_reset</span>
</div>
</div>
<!-- Headings -->
<div class="text-center mb-xl w-full">
<h2 class="font-display-h2 text-[28px] text-on-surface mb-sm">Create New Password</h2>
<p class="font-body-main text-body-main text-on-surface-variant">Your new password must be different from previous used passwords.</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-lg">
<!-- New Password Input -->
<div class="relative w-full">
<input class="floating-input w-full h-14 bg-surface px-md border border-outline rounded-lg font-body-main text-on-surface placeholder-transparent" id="new-password" placeholder="New Password" type="password"/>
<label class="floating-label font-body-main text-outline" for="new-password">New Password</label>
<button class="absolute right-md top-1/2 transform -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="w-full flex flex-col gap-sm mt-[-8px]">
<div class="flex gap-xs h-1 w-full rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-error"></div>
<div class="h-full w-1/3 bg-secondary-container"></div>
<div class="h-full w-1/3 bg-surface-variant"></div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant text-right">Medium</span>
</div>
<!-- Confirm Password Input -->
<div class="relative w-full">
<input class="floating-input w-full h-14 bg-surface px-md border border-outline rounded-lg font-body-main text-on-surface placeholder-transparent" id="confirm-password" placeholder="Confirm New Password" type="password"/>
<label class="floating-label font-body-main text-outline" for="confirm-password">Confirm New Password</label>
<button class="absolute right-md top-1/2 transform -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Match Indicator -->
<div class="flex items-center gap-sm text-primary">
<span class="material-symbols-outlined text-sm" data-icon="check_circle">check_circle</span>
<span class="font-body-sm text-body-sm">Passwords match</span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-ui-h4 text-ui-h4 py-md rounded-lg shadow-[0px_4px_20px_rgba(27,94,32,0.04)] hover:shadow-[0px_8px_30px_rgba(27,94,32,0.08)] hover:-translate-y-[2px] transition-all duration-200 mt-md flex justify-center items-center" type="button">
                    Update Password
                </button>
</form>
</div>
<!-- Success State (Hidden by default, shown for demonstration structure) -->
<!-- In a real app, this would be toggled via JS. Adding hidden class. -->
<div class="hidden relative z-10 flex-col items-center justify-center text-center py-xl" id="success-state">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center shadow-[0px_8px_30px_rgba(27,94,32,0.08)] mb-lg">
<span class="material-symbols-outlined filled text-on-primary text-4xl" data-icon="check">check</span>
</div>
<h2 class="font-display-h2 text-display-h2 text-on-surface mb-md">Password Updated!</h2>
<p class="font-body-main text-body-main text-on-surface-variant mb-xl">Your password has been successfully changed. You can now securely log in to your account.</p>
<button class="w-full bg-secondary-container text-on-secondary-container font-ui-h4 text-ui-h4 py-md rounded-lg shadow-[0px_4px_20px_rgba(27,94,32,0.04)] hover:shadow-[0px_8px_30px_rgba(27,94,32,0.08)] hover:-translate-y-[2px] transition-all duration-200 flex justify-center items-center gap-sm" type="button">
                Sign In Now
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
</body></html>
